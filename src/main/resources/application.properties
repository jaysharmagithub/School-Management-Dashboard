spring.datasource.url = jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:dashboard_db}

spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}





spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:20000}


spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}


logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.com.zorvyn=${LOG_LEVEL_APP:DEBUG}


spring.jackson.date-format=${JACKSON_DATE_FORMAT:yyyy-MM-dd}
spring.jackson.serialization.write-dates-as-timestamps=${JACKSON_WRITE_DATES:false}
spring.jackson.time-zone=${APP_TIMEZONE:UTC}


spring.mvc.format.date=${MVC_DATE_FORMAT:iso}


server.port=${SERVER_PORT:8080}
server.error.include-message=${SERVER_ERROR_MESSAGE:never}
server.error.include-binding-errors=${SERVER_ERROR_BINDING:never}


springdoc.api-docs.enabled=${SWAGGER_API_DOCS:true}
springdoc.swagger-ui.enabled=${SWAGGER_UI:true}
springdoc.swagger-ui.path=${SWAGGER_PATH:/swagger-ui.html}