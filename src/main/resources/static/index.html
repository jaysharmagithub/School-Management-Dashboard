    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>EduCloud SPA</title>
<!--        <script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.2/dist/xlsx.full.min.js"></script>-->
<!--        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">-->

        <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="icon" href="data:,">
        <style>
            .cursor-pointer { cursor: pointer; }
            .column-filter { max-height: 250px; overflow-y: auto; }
            .hidden-column { display: none; }
        </style>
    </head>
    <body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">EduCloud</span>
            <ul class="navbar-nav flex-row gap-3">
                <li><a class="nav-link text-white" id="navDashboard">Dashboard</a></li>
                <li class="dropdown">
                    <a class="nav-link dropdown-toggle text-white" data-bs-toggle="dropdown">Add</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" onclick="loadForm('student')">Student</a></li>
                        <li><a class="dropdown-item" onclick="loadForm('teacher')">Teacher</a></li>
                        <li><a class="dropdown-item" onclick="loadForm('parent')">Parent</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Welcome -->
        <div id="welcomeSection">
            <div class="alert alert-info">Welcome 🚀</div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboardSection" class="d-none">
            <ul class="nav nav-tabs">
                <li class="nav-item"><a class="nav-link active tab-btn" data-type="students">Students</a></li>
                <li class="nav-item"><a class="nav-link tab-btn" data-type="parents">Parents</a></li>
                <li class="nav-item"><a class="nav-link tab-btn" data-type="teachers">Teachers</a></li>
            </ul>

            <div class="mt-3">

                <div class="d-flex justify-content-between mb-2">
                    <div id="paginationControls"></div>
                    <button class="btn btn-secondary btn-sm" id="columnFilterBtn">Columns</button>
                </div>

                <div id="loadingState" class="text-center d-none">
                    <div class="spinner-border"></div>
                </div>

                <div class="mb-2">
                    <button id="downloadExcel" class="btn btn-success btn-sm">Download Current Page Excel</button>
                </div>

                <table class="table table-bordered d-none" id="dataTable">
                    <thead></thead>
                    <tbody></tbody>
                </table>


                <div id="noDataState" class="alert alert-warning d-none">No Data Available</div>
            </div>


        </div>

        <!-- FORM SECTION -->
        <div id="formSection" class="d-none">
            <div id="formContainer"></div>
        </div>

        <!-- COLUMN FILTER MODAL -->
        <div class="modal fade" id="columnFilterModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Select Columns</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body column-filter" id="columnFilterContainer"></div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary" id="applyColumnFilter">Apply</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "http://localhost:8080/api";

        let currentTab = "students";
        let metadataCache = {};
        let pageInfo = { page:0, size:10, totalPages:1 };

        $(function(){
            $("#navDashboard").click(()=>{ showDashboard(); loadPage(currentTab,0); });
            $(".tab-btn").click(function(){
                $(".tab-btn").removeClass("active");
                $(this).addClass("active");
                currentTab = $(this).data("type");
                loadPage(currentTab,0);
            });
            $("#columnFilterBtn").click(()=> showColumnFilter());
            $("#applyColumnFilter").click(()=> applyColumnFilter());
        });

        function showDashboard(){
            $("#welcomeSection,#formSection").addClass("d-none");
            $("#dashboardSection").removeClass("d-none");
        }

        function showLoading(){ $("#loadingState").removeClass("d-none"); $("#dataTable,#noDataState").addClass("d-none"); }
        function showNoData(){ $("#noDataState").removeClass("d-none"); $("#loadingState,#dataTable").addClass("d-none"); }
        function hideAll(){ $("#loadingState,#noDataState,#dataTable").addClass("d-none"); }

        async function loadMetadata(tab){
            if(metadataCache[tab]) return metadataCache[tab];
            const res = await fetch(`${BASE_URL}/${tab}/metadata`);
            const json = await res.json();
            metadataCache[tab] = json;
            return json;
        }

        // =================== TABLE =====================
        async function loadPage(tab,page){
            showLoading();
            const size = 10;
            try{
                const meta = await loadMetadata(tab);
                const url = `${BASE_URL}/${tab}?page=${page}&size=${size}`;
                const res = await fetch(url);
                const json = await res.json();
                pageInfo = { page:json.page, size:json.size, totalPages:json.totalPages };
                renderTable(json.data, meta);
                renderPagination();
            }catch(e){ console.error(e); showNoData(); }
        }

        // =================== DOWNLOAD CURRENT PAGE =====================
        $(function() {
    $("#downloadExcel").click(function() {
        if(typeof XLSX === "undefined"){ alert("XLSX library not loaded"); return; }

        const table = $("#dataTable");
        const rows = [];
        const visibleCols = [];

        table.find("thead th:visible").each(function() { visibleCols.push($(this).text()); });

        table.find("tbody tr:visible").each(function() {
            const rowData = {};
            $(this).find("td:visible").each(function(i){ rowData[visibleCols[i]] = $(this).text(); });
            rows.push(rowData);
        });

        if(rows.length===0){ alert("No data to download"); return; }

        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, capitalize(currentTab));

        XLSX.writeFile(wb, `${capitalize(currentTab)}_Page${pageInfo.page+1}.xlsx`);
    });
});

        function renderTable(data, meta){
            hideAll();
            if(!data || !data.length) { showNoData(); return; }

            // HEADER
            let thead="<tr>";
            meta.forEach(f=> thead+=`<th data-field="${f.name}">${formatLabel(f.name)}</th>`);
            thead+="<th>Actions</th></tr>";
            $("#dataTable thead").html(thead);

            // BODY
            let tbody="";
            data.forEach(row=>{
                tbody+=`<tr data-id="${row.id||''}">`;
                meta.forEach(f=> tbody+=`<td data-field="${f.name}" class="cursor-pointer">${row[f.name]??'-'}</td>`);
                tbody+=`<td>
                    <button class="btn btn-sm btn-warning edit-row-btn">Edit</button>
                    <button class="btn btn-sm btn-success save-row-btn d-none">Save</button>
                    <button class="btn btn-sm btn-secondary cancel-row-btn d-none">Cancel</button>
                    <button class="btn btn-sm btn-danger delete-row-btn">Delete</button>
                </td>`;
                tbody+="</tr>";
            });
            $("#dataTable tbody").html(tbody);
            $("#dataTable").removeClass("d-none");
        }

        // =================== INLINE CELL EDIT =====================
        $(document).on("click","#dataTable td[data-field]",function(){
            const td=$(this);
            if(td.find("input").length) return; // already editing
            const row=td.closest("tr");
            td.html(`<input class="form-control form-control-sm" value="${td.text()!=='-'?td.text():''}">`);
            row.find(".edit-row-btn,.delete-row-btn").addClass("d-none");
            row.find(".save-row-btn,.cancel-row-btn").removeClass("d-none");
        });

        $(document).on("click",".cancel-row-btn",function(){ loadPage(currentTab,pageInfo.page); });

        $(document).on("click",".save-row-btn",async function(){
            const row=$(this).closest("tr");
            const id=row.data("id");
            const obj={};
            row.find("td[data-field]").each(function(){
                obj[$(this).data("field")]=$(this).find("input").val();
            });
            try{
                await fetch(`${BASE_URL}/${currentTab}/${id}`,{
                    method:"PUT",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify(obj)
                });
                loadPage(currentTab,pageInfo.page);
            }catch(e){ alert("Update failed"); }
        });

        // =================== ROW FULL EDIT =====================
       // =================== ROW FULL EDIT =====================
    $(document).on("click", ".edit-row-btn", async function() {
        const row = $(this).closest("tr");
        const id = row.data("id");

        // Get metadata for current tab
        const meta = await loadMetadata(currentTab);

        // Build row edit form
        let html = `<h3>Edit ${capitalize(currentTab.slice(0, -1))}</h3><form id="entityForm">`;
        meta.forEach(f => {
            const val = row.find(`td[data-field="${f.name}"]`).text() === '-' ? '' : row.find(`td[data-field="${f.name}"]`).text();
            const type = detectType(f.name);
            html += `<div class="mb-3">
                        <label>${formatLabel(f.name)}${f.required?'*':''}</label>
                        <input name="${f.name}" type="${type}" class="form-control" value="${val}" ${f.required?'required':''}>
                     </div>`;
        });
        html += `<button class="btn btn-primary">Save</button>
                 <button type="button" class="btn btn-secondary ms-2" onclick="showDashboard()">Cancel</button></form>`;

        // Show form section
        $("#dashboardSection").addClass("d-none");
        $("#formSection").removeClass("d-none");
        $("#formContainer").html(html);

        // Handle submit
        $("#entityForm").submit(async function(e){
            e.preventDefault();
            const obj = {};
            new FormData(this).forEach((v,k)=> obj[k]=v);
            try {
                await fetch(`${BASE_URL}/${currentTab}/${id}`, {
                    method: "PUT",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify(obj)
                });
                showDashboard();
                loadPage(currentTab,pageInfo.page);
            } catch(e){
                alert("Save failed");
            }
        });
    });
        // =================== DELETE =====================
        $(document).on("click",".delete-row-btn",async function(){
            if(!confirm("Delete this row?")) return;
            const id=$(this).closest("tr").data("id");
            try{
                await fetch(`${BASE_URL}/${currentTab}/${id}`,{method:"DELETE"});
                loadPage(currentTab,pageInfo.page);
            }catch(e){ alert("Delete failed"); }
        });

        // =================== ADD / FULL FORM =====================
        async function loadForm(tab,id=null,rowData=null){
            showDashboard();
            $("#dashboardSection").addClass("d-none");
            $("#formSection").removeClass("d-none");
            const meta=await loadMetadata(tab);
            let html=`<h3>${id?'Edit':'Add'} ${capitalize(tab.slice(0,-1))}</h3><form id="entityForm">`;
            meta.forEach(f=>{
                const val=rowData?rowData[f.name]||'':'';
                const type=detectType(f.name);
                html+=`<div class="mb-3">
                    <label>${formatLabel(f.name)}${f.required?'*':''}</label>
                    <input name="${f.name}" type="${type}" class="form-control" value="${val}" ${f.required?'required':''}>
                </div>`;
            });
            html+=`<button class="btn btn-primary">Save</button>
                   <button type="button" class="btn btn-secondary ms-2" onclick="showDashboard()">Cancel</button></form>`;
            $("#formContainer").html(html);

            $("#entityForm").submit(async function(e){
                e.preventDefault();
                const obj={};
                new FormData(this).forEach((v,k)=>obj[k]=v);
                try{
                    if(id){
                        await fetch(`${BASE_URL}/${tab}/${id}`,{
                            method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(obj)
                        });
                    }else{
                        await fetch(`${BASE_URL}/${tab}`,{
                            method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(obj)
                        });
                    }
                    showDashboard();
                    loadPage(tab,0);
                }catch(e){ alert("Save failed"); }
            });
        }

        // =================== COLUMN FILTER =====================
        let currentColumnsVisible=[];
        async function showColumnFilter(){
            const meta=await loadMetadata(currentTab);
            const html=meta.map(f=>`<div class="form-check">
                <input class="form-check-input column-checkbox" type="checkbox" value="${f.name}" checked>
                <label class="form-check-label">${formatLabel(f.name)}</label>
            </div>`).join('');
            $("#columnFilterContainer").html(html);
            const modal=new bootstrap.Modal(document.getElementById("columnFilterModal"));
            modal.show();
        }

        function applyColumnFilter(){
            currentColumnsVisible=[];
            $("#columnFilterContainer .column-checkbox").each(function(){
                const col=$(this).val();
                if($(this).is(":checked")) currentColumnsVisible.push(col);
            });
            $("#dataTable thead th, #dataTable tbody td").each(function(){
                const field=$(this).data("field");
                if(field) $(this).toggleClass("hidden-column",!currentColumnsVisible.includes(field));
            });
            const modalEl=document.getElementById("columnFilterModal");
            bootstrap.Modal.getInstance(modalEl).hide();
        }

        // =================== PAGINATION =====================
        function renderPagination(){
            let html=`<nav><ul class="pagination pagination-sm">`;
            if(pageInfo.page>0) html+=`<li class="page-item"><a class="page-link cursor-pointer" onclick="loadPage('${currentTab}',${pageInfo.page-1})">Prev</a></li>`;
            for(let i=0;i<pageInfo.totalPages;i++)
                html+=`<li class="page-item ${i===pageInfo.page?'active':''}"><a class="page-link cursor-pointer" onclick="loadPage('${currentTab}',${i})">${i+1}</a></li>`;
            if(pageInfo.page<pageInfo.totalPages-1) html+=`<li class="page-item"><a class="page-link cursor-pointer" onclick="loadPage('${currentTab}',${pageInfo.page+1})">Next</a></li>`;
            html+=`</ul></nav>`;
            $("#paginationControls").html(html);
        }

        // =================== HELPERS =====================
        function detectType(field){
            const f=field.toLowerCase();
            if(f.includes("email")) return "email";
            if(f.includes("date")) return "date";
            if(f.includes("phone")) return "tel";
            if(f.includes("number")||f.includes("years")) return "number";
            return "text";
        }

        function formatLabel(s){ return s.replace(/([A-Z])/g," $1").replace(/^./,c=>c.toUpperCase()); }
        function capitalize(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
